services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: gukba-big:latest
    container_name: gukba-big
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8887}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # 백엔드 주소 — Next 프록시가 /api/* 를 이 주소로 전달.
      # host.docker.internal 은 컨테이너에서 호스트 머신을 가리키는 특수 DNS.
      # Mac/Windows Docker Desktop 에선 기본 제공, Linux 는 extra_hosts 로 주입.
      BACKEND_URL: "${BACKEND_URL:-http://host.docker.internal:8081}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
